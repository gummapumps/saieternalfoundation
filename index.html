<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sai Eternal Foundation – Pipe Data Management</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg0:#07080f;--bg1:#0c0e1a;--bg2:#111428;--bg3:#181b32;
  --surface:#1c2038;--surface2:#212540;--surface3:#272b48;
  --border:rgba(120,130,220,.12);--border2:rgba(120,130,220,.25);--border3:rgba(120,130,220,.45);
  --amber:#f5a623;--amber2:#ffbe4f;--amber-dim:rgba(245,166,35,.15);--amber-glow:0 0 24px rgba(245,166,35,.35);
  --indigo:#6c7ef8;--indigo2:#8b97ff;--indigo-dim:rgba(108,126,248,.15);--indigo-glow:0 0 24px rgba(108,126,248,.35);
  --teal:#1de9b6;--teal-dim:rgba(29,233,182,.12);--teal-glow:0 0 20px rgba(29,233,182,.3);
  --rose:#ff4f7b;--rose-dim:rgba(255,79,123,.12);
  --sky:#38b6ff;--sky-dim:rgba(56,182,255,.12);
  --text0:#f0f2ff;--text1:#b8bde8;--text2:#7a7fa8;--text3:#4a4e72;
  --green:#22d57a;--green-dim:rgba(34,213,122,.12);
  --r6:6px;--r10:10px;--r14:14px;--r20:20px;--r28:28px;
  --fw:260px;--th:60px;
  --tr:.22s cubic-bezier(.4,0,.2,1);
  --glass:rgba(24,27,50,.72);
  --shadow-card:0 4px 24px rgba(0,0,0,.45),0 1px 4px rgba(0,0,0,.3);
  --shadow-xl:0 20px 60px rgba(0,0,0,.6),0 4px 16px rgba(0,0,0,.4);
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'JetBrains Mono',monospace;
}
[data-theme="light"]{
  --bg0:#eef0f8;--bg1:#f5f6fc;--bg2:#fff;--bg3:#f0f1f8;
  --surface:#fff;--surface2:#f4f5fb;--surface3:#e8eaf5;
  --border:rgba(100,110,210,.14);--border2:rgba(100,110,210,.28);--border3:rgba(100,110,210,.5);
  --text0:#181a2e;--text1:#3a3f6a;--text2:#6b70a0;--text3:#9da3cc;
  --glass:rgba(240,242,255,.9);
  --shadow-card:0 2px 14px rgba(80,90,200,.1);--shadow-xl:0 12px 40px rgba(80,90,200,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg0);color:var(--text0);min-height:100vh;overflow-x:hidden;line-height:1.6}
button{cursor:pointer;border:none;outline:none;font-family:var(--font-b)}
input,select,textarea{font-family:var(--font-b);outline:none;border:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::selection{background:rgba(108,126,248,.35)}
.mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh-bg::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 15% 40%,rgba(108,126,248,.06) 0%,transparent 60%),
             radial-gradient(ellipse 60% 80% at 85% 20%,rgba(245,166,35,.05) 0%,transparent 55%),
             radial-gradient(ellipse 70% 50% at 50% 90%,rgba(29,233,182,.04) 0%,transparent 50%)}
.mesh-grid{position:absolute;inset:0;opacity:.04;
  background-image:linear-gradient(rgba(108,126,248,1) 1px,transparent 1px),linear-gradient(90deg,rgba(108,126,248,1) 1px,transparent 1px);
  background-size:48px 48px}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 18s ease-in-out infinite}
.mesh-orb:nth-child(1){width:500px;height:500px;background:rgba(108,126,248,.04);top:-150px;left:-100px;animation-delay:0s}
.mesh-orb:nth-child(2){width:400px;height:400px;background:rgba(245,166,35,.04);top:30%;right:-80px;animation-delay:-7s}
.mesh-orb:nth-child(3){width:350px;height:350px;background:rgba(29,233,182,.03);bottom:-100px;left:30%;animation-delay:-13s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.97)}}
#login-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg0);transition:opacity .5s,visibility .5s}
#login-screen.gone{opacity:0;visibility:hidden;pointer-events:none}
.login-shell{position:relative;width:460px;max-width:95vw}
.login-glow{position:absolute;inset:-60px;border-radius:50%;background:radial-gradient(ellipse,rgba(108,126,248,.15) 0%,transparent 70%);pointer-events:none;animation:loginGlow 4s ease-in-out infinite alternate}
@keyframes loginGlow{from{opacity:.5}to{opacity:1}}
.login-card{position:relative;background:var(--glass);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid var(--border2);border-radius:var(--r28);padding:48px 44px;box-shadow:var(--shadow-xl),inset 0 1px 0 rgba(255,255,255,.06)}
.login-badge{display:inline-flex;align-items:center;gap:8px;background:var(--amber-dim);border:1px solid rgba(245,166,35,.3);color:var(--amber);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:28px}
.login-title{font-family:var(--font-h);font-size:26px;font-weight:800;line-height:1.2;margin-bottom:6px}
.login-title span{background:linear-gradient(135deg,var(--indigo2),var(--amber2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:36px}
.login-tagline{font-size:12px;color:var(--text3);text-align:center;margin-top:24px;font-style:italic}
.lf-group{margin-bottom:18px}
.lf-label{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);display:block;margin-bottom:7px}
.lf-wrap{position:relative}
.lf-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.lf-wrap input{width:100%;padding:12px 14px 12px 42px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);color:var(--text0);font-size:14px;transition:var(--tr)}
.lf-wrap input:focus{border-color:var(--indigo);background:rgba(108,126,248,.07);box-shadow:var(--indigo-glow)}
.lf-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;color:var(--text3);font-size:14px;transition:color .2s}
.lf-toggle:hover{color:var(--indigo2)}
.btn-login{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,var(--indigo),rgba(108,126,248,.7));color:#fff;font-family:var(--font-h);font-size:15px;font-weight:700;letter-spacing:1px;border-radius:var(--r10);transition:var(--tr);position:relative;overflow:hidden}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);opacity:0;transition:.3s}
.btn-login:hover{transform:translateY(-2px);box-shadow:var(--indigo-glow),var(--shadow-xl)}
.btn-login:hover::before{opacity:1}
.login-err{color:var(--rose);font-size:13px;text-align:center;margin-top:12px;min-height:16px}
#eng-select-screen{position:fixed;inset:0;z-index:9998;display:none;align-items:center;justify-content:center;background:var(--bg0)}
#eng-select-screen.show{display:flex}
.eng-sel-card{background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--border2);border-radius:var(--r28);padding:40px 44px;width:520px;max-width:95vw;box-shadow:var(--shadow-xl)}
.eng-sel-card h2{font-family:var(--font-h);font-size:22px;font-weight:800;margin-bottom:6px}
.eng-sel-card p{font-size:13px;color:var(--text2);margin-bottom:28px}
.eng-sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;max-height:320px;overflow-y:auto}
.eng-sel-btn{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r14);padding:18px;cursor:pointer;transition:var(--tr);text-align:left}
.eng-sel-btn:hover{border-color:var(--indigo);background:var(--indigo-dim);transform:translateY(-2px);box-shadow:var(--indigo-glow)}
.eng-sel-btn .esb-name{font-family:var(--font-h);font-size:14px;font-weight:700;margin-bottom:3px}
.eng-sel-btn .esb-id{font-size:11px;color:var(--text3);font-family:var(--font-m)}
#app{display:flex;min-height:100vh;position:relative;z-index:1}
#app.gone{display:none}
.sidebar{width:var(--fw);min-height:100vh;background:var(--bg1);border-right:1px solid var(--border);position:fixed;left:0;top:0;bottom:0;z-index:200;display:flex;flex-direction:column;transition:transform .32s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sidebar.closed{transform:translateX(-100%)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:199}
.sb-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--indigo),var(--amber));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:var(--indigo-glow)}
.sb-brand h2{font-family:var(--font-h);font-size:14px;font-weight:700;letter-spacing:.5px;line-height:1.2;white-space:nowrap}
.sb-brand p{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-sec-label{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:10px 12px 5px;white-space:nowrap}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r10);cursor:pointer;transition:var(--tr);margin-bottom:1px;position:relative;white-space:nowrap}
.sb-item:hover{background:var(--surface)}
.sb-item.active{background:linear-gradient(135deg,rgba(108,126,248,.2),rgba(108,126,248,.08));border:1px solid rgba(108,126,248,.25);box-shadow:var(--indigo-glow)}
.sb-item.active .sb-icon{color:var(--indigo2)}
.sb-item.active .sb-lbl{color:var(--text0);font-weight:600}
.sb-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0;color:var(--text2)}
.sb-lbl{font-size:13.5px;color:var(--text1)}
.sb-badge{margin-left:auto;background:var(--rose);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.sb-foot{padding:14px 10px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r10);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--tr)}
.sb-user:hover{border-color:var(--border2)}
.sb-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;font-size:14px;flex-shrink:0}
.sb-uinfo .sb-uname{font-size:12.5px;font-weight:600}
.sb-uinfo .sb-urole{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.btn-logout{margin-left:auto;background:none;color:var(--rose);font-size:16px;opacity:.7;transition:.2s}
.btn-logout:hover{opacity:1}
.topbar{height:var(--th);background:rgba(12,14,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:100}
[data-theme="light"] .topbar{background:rgba(255,255,255,.9)}
.tb-toggle{background:none;color:var(--text1);font-size:20px;padding:6px;border-radius:var(--r6);transition:var(--tr)}
.tb-toggle:hover{background:var(--surface);color:var(--indigo2)}
.tb-title{font-family:var(--font-h);font-size:18px;font-weight:700;flex:1}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r10);padding:7px 14px;max-width:260px;flex:1;transition:var(--tr)}
.tb-search:focus-within{border-color:var(--indigo);box-shadow:var(--indigo-glow)}
.tb-search input{background:none;color:var(--text0);font-size:13px;width:100%}
.tb-search input::placeholder{color:var(--text3)}
.tb-actions{display:flex;align-items:center;gap:8px}
.tb-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r10);display:flex;align-items:center;justify-content:center;color:var(--text1);font-size:15px;transition:var(--tr);position:relative}
.tb-btn:hover{border-color:var(--indigo);color:var(--indigo2)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--rose);border-radius:50%;animation:blinkDot 2s infinite}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.2}}
.main-wrap{margin-left:var(--fw);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .32s cubic-bezier(.4,0,.2,1)}
.main-wrap.full{margin-left:0}
.content{flex:1;padding:26px 28px;overflow-y:auto}
.pg{display:none;animation:pgIn .35s ease}
.pg.on{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pg-head{margin-bottom:24px}
.pg-head h2{font-family:var(--font-h);font-size:26px;font-weight:800;letter-spacing:-.3px}
.pg-head p{color:var(--text2);font-size:13px;margin-top:3px}
.pg-head-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r14);box-shadow:var(--shadow-card);transition:var(--tr);overflow:hidden}
.card:hover{border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.card-h{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-h h3{font-family:var(--font-h);font-size:15px;font-weight:700}
.card-b{padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r14);padding:18px 20px;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.stat-card.c-indigo::after{background:linear-gradient(90deg,var(--indigo),transparent)}
.stat-card.c-amber::after{background:linear-gradient(90deg,var(--amber),transparent)}
.stat-card.c-teal::after{background:linear-gradient(90deg,var(--teal),transparent)}
.stat-card.c-rose::after{background:linear-gradient(90deg,var(--rose),transparent)}
.stat-card.c-sky::after{background:linear-gradient(90deg,var(--sky),transparent)}
.stat-card.c-green::after{background:linear-gradient(90deg,var(--green),transparent)}
.stat-card:hover{transform:translateY(-3px);border-color:var(--border3)}
.stat-card:hover.c-indigo{box-shadow:var(--indigo-glow)}
.stat-card:hover.c-amber{box-shadow:var(--amber-glow)}
.stat-card:hover.c-teal{box-shadow:var(--teal-glow)}
.sc-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.c-indigo .sc-icon{background:var(--indigo-dim)}.c-amber .sc-icon{background:var(--amber-dim)}.c-teal .sc-icon{background:var(--teal-dim)}.c-rose .sc-icon{background:var(--rose-dim)}.c-sky .sc-icon{background:var(--sky-dim)}.c-green .sc-icon{background:var(--green-dim)}
.sc-val{font-family:var(--font-h);font-size:30px;font-weight:800;line-height:1;margin-bottom:4px}
.c-indigo .sc-val{color:var(--indigo2)}.c-amber .sc-val{color:var(--amber2)}.c-teal .sc-val{color:var(--teal)}.c-rose .sc-val{color:var(--rose)}.c-sky .sc-val{color:var(--sky)}.c-green .sc-val{color:var(--green)}
.sc-label{font-size:12px;color:var(--text2);font-weight:500}.sc-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sc-bg{position:absolute;right:-8px;bottom:-8px;font-size:72px;opacity:.04;pointer-events:none}
.sc-arrow{position:absolute;top:16px;right:16px;color:var(--text3);font-size:16px;transition:var(--tr)}
.stat-card:hover .sc-arrow{color:var(--indigo2);transform:translate(2px,-2px)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.mb16{margin-bottom:16px}.mb22{margin-bottom:22px}
.t-wrap{overflow-x:auto;border-radius:var(--r10)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--border2)}
th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--surface2)}
td{padding:12px 14px;color:var(--text0)}
.t-actions{display:flex;gap:6px}
td:first-child{font-weight:500}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--r10);font-size:13px;font-weight:600;letter-spacing:.3px;transition:var(--tr);cursor:pointer}
.btn-pri{background:linear-gradient(135deg,var(--indigo),rgba(108,126,248,.75));color:#fff}
.btn-pri:hover{box-shadow:var(--indigo-glow);transform:translateY(-1px)}
.btn-amber{background:linear-gradient(135deg,var(--amber),rgba(245,166,35,.7));color:#0a0800}
.btn-amber:hover{box-shadow:var(--amber-glow);transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text1)}
.btn-ghost:hover{border-color:var(--indigo);color:var(--indigo2)}
.btn-danger{background:var(--rose-dim);border:1px solid rgba(255,79,123,.3);color:var(--rose)}
.btn-danger:hover{background:rgba(255,79,123,.25)}
.btn-success{background:var(--green-dim);border:1px solid rgba(34,213,122,.3);color:var(--green)}
.btn-success:hover{background:rgba(34,213,122,.25)}
.btn-sm{padding:5px 10px;font-size:11.5px;border-radius:var(--r6)}
.btn-icon{padding:7px;border-radius:var(--r6)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2)}
.fg input,.fg select,.fg textarea{background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px;transition:var(--tr);width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--indigo);background:rgba(108,126,248,.07);box-shadow:var(--indigo-glow)}
.fg select option{background:var(--bg2)}
.fg textarea{resize:vertical;min-height:70px}
.fg-row{display:grid;gap:12px}
.fg-row.c2{grid-template-columns:1fr 1fr}.fg-row.c3{grid-template-columns:1fr 1fr 1fr}.fg-row.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:10px;padding-top:14px;border-top:1px solid var(--border)}
.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;transition:opacity .25s,visibility .25s}
.modal-ov.gone{opacity:0;visibility:hidden;pointer-events:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r20);box-shadow:var(--shadow-xl);width:100%;max-width:620px;max-height:92vh;display:flex;flex-direction:column;animation:modalIn .3s cubic-bezier(.34,1.4,.64,1)}
.modal.wide{max-width:820px}.modal.xwide{max-width:1000px}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-family:var(--font-h);font-size:17px;font-weight:700}
.modal-x{background:none;color:var(--text2);font-size:20px;transition:color .2s;line-height:1}
.modal-x:hover{color:var(--rose)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.4px}
.b-indigo{background:var(--indigo-dim);color:var(--indigo2);border:1px solid rgba(108,126,248,.25)}
.b-amber{background:var(--amber-dim);color:var(--amber2);border:1px solid rgba(245,166,35,.25)}
.b-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(29,233,182,.2)}
.b-rose{background:var(--rose-dim);color:var(--rose);border:1px solid rgba(255,79,123,.25)}
.b-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,213,122,.25)}
.b-sky{background:var(--sky-dim);color:var(--sky);border:1px solid rgba(56,182,255,.2)}
.b-gray{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9000;display:flex;flex-direction:column;gap:9px}
.toast{padding:13px 18px;border-radius:var(--r10);display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-xl);animation:toastIn .4s cubic-bezier(.34,1.4,.64,1);font-size:13.5px;font-weight:500;min-width:270px;max-width:360px;backdrop-filter:blur(20px)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:rgba(34,213,122,.15);border:1px solid rgba(34,213,122,.35);color:var(--green)}
.toast.err{background:var(--rose-dim);border:1px solid rgba(255,79,123,.35);color:var(--rose)}
.toast.warn{background:var(--amber-dim);border:1px solid rgba(245,166,35,.35);color:var(--amber2)}
.toast.info{background:var(--indigo-dim);border:1px solid rgba(108,126,248,.35);color:var(--indigo2)}
.prog-wrap{background:rgba(255,255,255,.06);border-radius:20px;height:7px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;transition:width .6s ease}
.prog-indigo{background:linear-gradient(90deg,var(--indigo),rgba(108,126,248,.5))}
.prog-amber{background:linear-gradient(90deg,var(--amber),rgba(245,166,35,.5))}
.prog-teal{background:linear-gradient(90deg,var(--teal),rgba(29,233,182,.5))}

.tab-btn{padding:7px 16px;border-radius:var(--r6);font-size:12.5px;font-weight:600;background:none;color:var(--text2);transition:var(--tr);white-space:nowrap}
.tab-btn.on{background:linear-gradient(135deg,var(--indigo),rgba(108,126,248,.65));color:#fff}
.tab-btn:hover:not(.on){background:var(--surface3);color:var(--text0)}
.tab-pane{display:none}.tab-pane.on{display:block;animation:pgIn .3s ease}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filter-bar input,.filter-bar select{background:var(--surface);border:1px solid var(--border);border-radius:var(--r10);padding:8px 13px;color:var(--text0);font-size:13px;transition:var(--tr)}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--indigo)}
.filter-bar input{flex:1;min-width:160px}
.chart-box{position:relative;width:100%}.chart-box canvas{max-height:280px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r14);padding:20px}
.chart-card h3{font-family:var(--font-h);font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text1)}
.eng-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r14);padding:18px 20px;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.eng-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.eng-card.ac::before{background:linear-gradient(90deg,var(--teal),transparent)}

/* IMPROVED FITTING ROW */

.del-row-btn:hover{background:rgba(255,79,123,.3)}

.notif-panel{position:fixed;top:var(--th);right:0;width:320px;max-height:calc(100vh - var(--th));background:var(--bg1);border-left:1px solid var(--border);border-bottom:1px solid var(--border);z-index:300;overflow-y:auto;box-shadow:var(--shadow-xl);transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s}

/* PIPE SELECTOR CARD */

.highlight-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r10);padding:14px 16px;margin-bottom:14px}

<script>
/* ═══════════════════════════════════════════════
   SEF PDMS v5.0 – ENTERPRISE EDITION
   Feature Fixes: Pipe Linking, Fittings, Junctions,
   Monthly Balance, Real-time Sync
═══════════════════════════════════════════════ */

// ── CREDENTIALS ───────────────────────────────
const CREDS = {
  saiadmin:{ pass:'SaiAdmin@12',  role:'admin',   name:'Administrator', color:'#6c7ef8' },
  saiuser: { pass:'user@saiEF',   role:'engineer',name:'Site Engineer',  color:'#1de9b6' },
  viewer:  { pass:'Sai@viewer',   role:'viewer',  name:'Viewer',         color:'#f5a623' }
};

// ── STATE ──────────────────────────────────────
let CU = null;
let selectedEngineerId = null;
let CI = {};
let sidebarOpen = window.innerWidth > 768;
let deleteCallback = null;
let cfRowCount = 0;
let currentPage = '';

// ── LS HELPERS ─────────────────────────────────
const LS = {
  g:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  d:(k)=>localStorage.removeItem(k)
};
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

// ── SEED DATA ──────────────────────────────────
function seedData(){
  if(LS.g('sef_seeded_v5')) return;
  // Clear old seed flag to force re-seed with new structure
  LS.d('sef_seeded');
  LS.s('sef_engineers',[
    {id:'e1',name:'Akhil Kumar',  empId:'ENG-001',phone:'+91 98765 43210',location:'Sector 5, Baddi',status:'active',joinDate:'2025-01-10',notes:'Lead engineer Site A'},
    {id:'e2',name:'Ravi Sharma',  empId:'ENG-002',phone:'+91 91234 56789',location:'Phase 2, Baddi',status:'active',joinDate:'2025-03-15',notes:''},
    {id:'e3',name:'Suresh Verma', empId:'ENG-003',phone:'+91 87654 32109',location:'Industrial Area', status:'active',joinDate:'2025-06-01',notes:''},
    {id:'e4',name:'Mohan Singh',  empId:'ENG-004',phone:'+91 76543 21098',location:'Main Road',      status:'inactive',joinDate:'2024-11-20',notes:'On leave'}
  ]);
  LS.s('sef_inventory',[
    {id:'p1',pipeType:'SAI', diameter:'80mm', material:'PVC', quantity:500,dateAdded:'2026-03-01',notes:'Main batch'},
    {id:'p2',pipeType:'SUEZ',diameter:'100mm',material:'HDPE',quantity:300,dateAdded:'2026-03-05',notes:''},
    {id:'p3',pipeType:'SAI', diameter:'150mm',material:'GI',  quantity:200,dateAdded:'2026-03-10',notes:''},
    {id:'p4',pipeType:'SAI', diameter:'80mm', material:'HDPE',quantity:400,dateAdded:'2026-03-12',notes:'Second batch'},
    {id:'p5',pipeType:'SUEZ',diameter:'100mm',material:'PVC', quantity:250,dateAdded:'2026-03-15',notes:''}
  ]);
  // Assignments now store assignedUsed to track DPR deductions per assignment
  LS.s('sef_assignments',[
    {id:'a1',engineerId:'e1',pipeId:'p1',quantity:120,assignedUsed:25,dateAssigned:'2026-04-01',notes:'Phase 1 work'},
    {id:'a2',engineerId:'e2',pipeId:'p2',quantity:80, assignedUsed:8, dateAssigned:'2026-04-01',notes:''},
    {id:'a3',engineerId:'e1',pipeId:'p3',quantity:50, assignedUsed:5, dateAssigned:'2026-03-20',notes:'Secondary line'},
    {id:'a4',engineerId:'e3',pipeId:'p4',quantity:200,assignedUsed:20,dateAssigned:'2026-04-02',notes:''},
    {id:'a5',engineerId:'e2',pipeId:'p5',quantity:30, assignedUsed:0, dateAssigned:'2026-03-28',notes:''}
  ]);
  LS.s('sef_dprs',[
    {id:'d1',engineerId:'e1',assignmentId:'a1',date:'2026-04-01',pipeType:'SAI', diameter:'80mm', pipesUsed:10,pipesLeft:110,meterLaid:80, totalJoints:9, startJunction:'A1',endJunction:'A2',fittings:[{name:'Bend',qty:2},{name:'Tee',qty:1}],customFields:[{fieldName:'Soil Type',fieldType:'text',value:'Rocky'}],notes:'Completed section A1-A2'},
    {id:'d2',engineerId:'e2',assignmentId:'a2',date:'2026-04-01',pipeType:'SUEZ',diameter:'100mm',pipesUsed:8, pipesLeft:72, meterLaid:64, totalJoints:7, startJunction:'B1',endJunction:'B2',fittings:[{name:'Valve',qty:1}],customFields:[],notes:''},
    {id:'d3',engineerId:'e1',assignmentId:'a1',date:'2026-04-02',pipeType:'SAI', diameter:'80mm', pipesUsed:15,pipesLeft:95, meterLaid:120,totalJoints:14,startJunction:'A2',endJunction:'A4',fittings:[{name:'Bend',qty:3},{name:'Reducer',qty:1}],customFields:[{fieldName:'Weather',fieldType:'text',value:'Sunny'}],notes:'Good progress'},
    {id:'d4',engineerId:'e3',assignmentId:'a4',date:'2026-04-02',pipeType:'SAI', diameter:'80mm', pipesUsed:20,pipesLeft:180,meterLaid:160,totalJoints:18,startJunction:'C1',endJunction:'C3',fittings:[],customFields:[],notes:'New trench opened'},
    {id:'d5',engineerId:'e1',assignmentId:'a3',date:'2026-04-03',pipeType:'SAI', diameter:'150mm',pipesUsed:5, pipesLeft:45, meterLaid:30, totalJoints:4, startJunction:'A4',endJunction:'A5',fittings:[{name:'Tee',qty:2}],customFields:[],notes:''}
  ]);
  LS.s('sef_targets',[
    {id:'t1',engineerId:'e1',month:'2026-04',targetMeters:500,targetPipes:80},
    {id:'t2',engineerId:'e2',month:'2026-04',targetMeters:400,targetPipes:60},
    {id:'t3',engineerId:'e3',month:'2026-04',targetMeters:600,targetPipes:100}
  ]);
  LS.s('sef_seeded_v5',true);
}

// ── DATA ACCESSORS ─────────────────────────────
const D = {
  engineers:()=>LS.g('sef_engineers')||[],
  inventory:()=>LS.g('sef_inventory')||[],
  assignments:()=>LS.g('sef_assignments')||[],
  dprs:()=>LS.g('sef_dprs')||[],
  targets:()=>LS.g('sef_targets')||[],
  saveEngineers:v=>LS.s('sef_engineers',v),
  saveInventory:v=>LS.s('sef_inventory',v),
  saveAssignments:v=>LS.s('sef_assignments',v),
  saveDprs:v=>LS.s('sef_dprs',v),
  saveTargets:v=>LS.s('sef_targets',v),
  engineer:(id)=>D.engineers().find(e=>e.id===id)||null,
  pipe:(id)=>D.inventory().find(p=>p.id===id)||null,
  assignment:(id)=>D.assignments().find(a=>a.id===id)||null,
  // Total assigned qty from all assignments for a pipe (for inventory tracking)
  assignedQty:(pipeId)=>D.assignments().filter(a=>a.pipeId===pipeId).reduce((s,a)=>s+a.quantity,0),
  availQty:(pipeId)=>{const p=D.pipe(pipeId);return p?p.quantity-D.assignedQty(pipeId):0},
  // Per-assignment remaining (assigned qty minus used from DPRs for that assignment)
  assignmentUsed:(assignmentId)=>D.dprs().filter(d=>d.assignmentId===assignmentId).reduce((s,d)=>s+d.pipesUsed,0),
  assignmentRemaining:(assignmentId)=>{
    const a=D.assignments().find(x=>x.id===assignmentId);
    if(!a) return 0;
    return Math.max(0, a.quantity - D.assignmentUsed(assignmentId));
  },
  // Get all active assignments for an engineer with pipe info
  engActiveAssignments:(engId)=>{
    return D.assignments().filter(a=>a.engineerId===engId).map(a=>{
      const p=D.pipe(a.pipeId);
      const used=D.assignmentUsed(a.id);
      const remaining=Math.max(0,a.quantity-used);
      return{...a,pipe:p,used,remaining};
    }).filter(a=>a.pipe);
  },
  engAssignments:(engId)=>D.assignments().filter(a=>a.engineerId===engId),
  engDprs:(engId)=>D.dprs().filter(d=>d.engineerId===engId),
  engUsed:(engId)=>D.engDprs(engId).reduce((s,d)=>s+d.pipesUsed,0),
  engMeters:(engId)=>D.engDprs(engId).reduce((s,d)=>s+d.meterLaid,0),
  // Monthly balance data for inventory page
  monthlyBalance:(month)=>{
    const inv=D.inventory();
    const dprs=D.dprs().filter(d=>d.date.startsWith(month));
    const prevMonth=getPrevMonth(month);
    const prevDprs=D.dprs().filter(d=>d.date<month+'-01'||d.date.startsWith(prevMonth));
    return inv.map(p=>{
      const issuedQty=D.assignedQty(p.pipeId||p.id); // total assigned
      const usedQty=dprs.filter(d=>d.diameter===p.diameter&&d.pipeType===p.pipeType).reduce((s,d)=>s+d.pipesUsed,0);
      const allUsed=D.dprs().filter(d=>d.diameter===p.diameter&&d.pipeType===p.pipeType&&d.date<month+'-01').reduce((s,d)=>s+d.pipesUsed,0);
      const openingBalance=p.quantity-allUsed;
      const remaining=Math.max(0,openingBalance-usedQty);
      return{...p,openingBalance:Math.max(0,openingBalance),issuedQty:D.assignedQty(p.id),usedQty,remaining};
    });
  }
};

function getPrevMonth(month){
  const [y,m]=month.split('-').map(Number);
  const d=new Date(y,m-2,1);
  return d.toISOString().slice(0,7);
}

// ── AUTH ───────────────────────────────────────
function doLogin(){
  const id=document.getElementById('li-id').value.trim();
  const pass=document.getElementById('li-pass').value;
  const err=document.getElementById('li-err');
  const cr=CREDS[id];
  if(cr && cr.pass===pass){
    CU={id,role:cr.role,name:cr.name,color:cr.color};
    LS.s('sef_session',CU);
    err.textContent='';
    seedData();
    if(cr.role==='engineer'){
      document.getElementById('login-screen').classList.add('gone');
      showEngineerSelectScreen();
    } else {
      launchApp();
    }

// ── TOAST ──────────────────────────────────────
function toast(msg,type='info'){
  const icons={ok:'✅',err:'❌',warn:'⚠️',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>{
    el.style.opacity='0';el.style.transform='translateX(40px)';el.style.transition='all .4s';
    setTimeout(()=>el.remove(),400);
  },3500);
}

const today=()=>new Date().toISOString().split('T')[0];

function fmtDate(d){

}

// ── CHART FACTORY ──────────────────────────────
function mkChart(id,type,data,opts={}){
  if(CI[id]){try{CI[id].destroy()}catch{}}
  const ctx=document.getElementById(id);
  if(!ctx) return;
  const tColor=getComputedStyle(document.documentElement).getPropertyValue('--text2').trim()||'#7a7fa8';
  const gColor='rgba(108,126,248,0.12)';
  CI[id]=new Chart(ctx,{type,data,options:{
    responsive:true,maintainAspectRatio:true,
    plugins:{
      legend:{labels:{color:tColor,font:{family:"'DM Sans'",size:12}}},
      tooltip:{backgroundColor:'rgba(12,14,26,.95)',borderColor:'rgba(108,126,248,.3)',borderWidth:1,titleColor:'#f0f2ff',bodyColor:'#b8bde8'}
    },
    scales:type!=='pie'&&type!=='doughnut'&&type!=='radar'?{
      x:{grid:{color:gColor},ticks:{color:tColor,font:{size:11}}},
      y:{grid:{color:gColor},ticks:{color:tColor,font:{size:11}}}
    }:{},
    ...opts
  }});
}

// ── STOCK HELPERS ──────────────────────────────
function stockStatus(avail,total){
  const pct=total>0?avail/total:0;
  if(pct>0.4) return{cls:'si-high',label:'Normal',prog:'prog-teal',pct:Math.round(pct*100)};
  if(pct>0.15) return{cls:'si-med',label:'Low',prog:'prog-amber',pct:Math.round(pct*100)};
  return{cls:'si-low',label:'Critical',prog:'prog-rose',pct:Math.round(pct*100)};
}

function scNav(cls,icon,val,label,sub,page){
  return`<div class="stat-card ${cls}" onclick="navigate('${page}')"><div class="sc-icon">${icon}</div><div class="sc-val">${val}</div><div class="sc-label">${label}</div>${sub?`<div class="sc-sub">${sub}</div>`:''}<span class="sc-bg">${icon}</span><span class="sc-arrow">→</span></div>`;
}
function emini(lbl,val,color){
  return`<div style="text-align:center;background:var(--surface2);padding:8px;border-radius:8px"><div style="font-family:var(--font-h);font-size:18px;font-weight:700;color:${color}">${val}</div><div style="font-size:10px;color:var(--text3)">${lbl}</div></div>`;
}
function ddetail(label,val,color){
  return`<div style="background:var(--surface2);padding:10px;border-radius:8px;text-align:center"><div style="font-family:var(--font-h);font-size:20px;font-weight:700;color:${color}">${val}</div><div style="font-size:10px;color:var(--text3)">${label}</div></div>`;
}

}

function switchInvTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('inv-tab-stock').style.display=tab==='stock'?'':'none';
  document.getElementById('inv-tab-balance').style.display=tab==='balance'?'':'none';
  if(tab==='balance') renderMonthlyBalance();
}

function renderMonthlyBalance(){
  const mth=document.getElementById('bal-month')?.value||thisMonth();
  const lbl=document.getElementById('bal-month-label');
  if(lbl) lbl.textContent=mth;
  const balData=D.monthlyBalance(mth);
  const tbody=document.getElementById('bal-tbody');
  if(!tbody) return;
  // Group by pipeType + diameter for totals
  let totalOpen=0,totalIssued=0,totalUsed=0,totalRemain=0;
  tbody.innerHTML=balData.map(p=>{
    totalOpen+=p.openingBalance;totalIssued+=p.issuedQty;totalUsed+=p.usedQty;totalRemain+=p.remaining;
    const st=stockStatus(p.remaining,p.openingBalance||1);
    return`<tr>
      <td><span class="badge ${p.pipeType==='SAI'?'b-indigo':'b-amber'}">${p.pipeType}</span></td>
      <td><b>${p.diameter}</b></td>
      <td>${p.material}</td>
      <td class="mono fw7" style="color:var(--indigo2)">${p.openingBalance}</td>
      <td class="mono" style="color:var(--amber2)">${p.issuedQty}</td>
      <td class="mono" style="color:var(--rose)">${p.usedQty}</td>
      <td class="mono fw7" style="color:${st.cls==='si-high'?'var(--teal)':st.cls==='si-med'?'var(--amber)':'var(--rose)'}">${p.remaining}</td>
      <td><span class="badge ${st.cls==='si-high'?'b-teal':st.cls==='si-med'?'b-amber':'b-rose'}">${st.label}</span></td>
    </tr>`;
  }).join('');
  // Total row
  tbody.innerHTML+=`<tr class="total-row">
    <td colspan="3" style="font-family:var(--font-h);font-size:12px;letter-spacing:.5px">TOTAL</td>
    <td class="mono fw7" style="color:var(--indigo2)">${totalOpen}</td>
    <td class="mono" style="color:var(--amber2)">${totalIssued}</td>
    <td class="mono" style="color:var(--rose)">${totalUsed}</td>
    <td class="mono fw7" style="color:var(--teal)">${totalRemain}</td>
    <td></td>
  </tr>`;
}

function openEditPipeModal(id){openAddPipeModal(id)}
function savePipe(editId){
  const pipeType=document.getElementById('p-type').value;
  const diameter=document.getElementById('p-diam').value.trim();
  const material=document.getElementById('p-mat').value;
  const quantity=parseInt(document.getElementById('p-qty').value)||0;
  const dateAdded=document.getElementById('p-date').value;
  const notes=document.getElementById('p-notes').value.trim();
  if(!diameter) return toast('Enter pipe diameter','err');
  if(quantity<=0) return toast('Quantity must be > 0','err');
  const inv=D.inventory();
  if(editId){
    const idx=inv.findIndex(p=>p.id===editId);
    if(idx!==-1) inv[idx]={...inv[idx],pipeType,diameter,material,quantity,dateAdded,notes};
    toast('Pipe updated','ok');
  } else {
    inv.push({id:uid(),pipeType,diameter,material,quantity,dateAdded,notes});

  D.saveInventory(inv);closeModal();
  renderInventoryPage(document.getElementById('content-area'));
}
function deletePipe(id){
  const p=D.pipe(id);if(!p)return;
  if(D.assignedQty(id)>0){toast('Cannot delete — pipes assigned to engineers','err');return}
  confirmDel(`Delete ${p.pipeType} ${p.diameter} (${p.material})?`,()=>{
    D.saveInventory(D.inventory().filter(x=>x.id!==id));
    toast('Pipe deleted','ok');
    renderInventoryPage(document.getElementById('content-area'));
    checkLowStock();
  });
}
function exportInventoryCsv(){
  const inv=D.inventory();
  const rows=[['Pipe Type','Diameter','Material','Total Qty','Assigned','Available','Date Added','Notes']];
  inv.forEach(p=>rows.push([p.pipeType,p.diameter,p.material,p.quantity,D.assignedQty(p.id),D.availQty(p.id),p.dateAdded,p.notes]));
  downloadCsv(rows,'sef_inventory.csv');
}

  const a=editId?asns.find(x=>x.id===editId):null;
  const prevQty=a&&a.pipeId===pipeId?a.quantity:0;

  }
  D.saveAssignments(asns);closeModal();
  renderAssignmentsPage(document.getElementById('content-area'));
}
function deleteAssignment(id){
  const used=D.assignmentUsed(id);
  if(used>0){toast(`Cannot delete — ${used} pipes already used in DPRs`,'err');return}
  confirmDel('Delete this assignment? Stock will be returned.',()=>{
    D.saveAssignments(D.assignments().filter(a=>a.id!==id));
    toast('Assignment deleted, stock returned','ok');
    renderAssignmentsPage(document.getElementById('content-area'));
    checkLowStock();
  });
}

// ── FITTINGS SYSTEM (IMPROVED) ─────────────────
// Standard fittings with dropdown + qty
const STD_FITTINGS=['Bend','Tee','Valve','Reducer','Coupler','Other'];
let fittingRowCounter=0;

function buildFittingsSection(existFittings=[]){
  fittingRowCounter=0;
  // Build default rows for standard fittings that already have values
  // Plus allow adding extra rows
  const existMap={};
  existFittings.forEach(f=>{existMap[f.name]=(existMap[f.name]||0)+f.qty});
  // Show all std fittings as rows
  const stdRows=STD_FITTINGS.map(name=>{
    fittingRowCounter++;
    const rId=fittingRowCounter;
    const qty=existMap[name]||'';
    return`<div class="fitting-row" id="frow-${rId}">
      <select id="fn-${rId}" style="background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px">
        ${STD_FITTINGS.map(s=>`<option ${s===name?'selected':''}>${s}</option>`).join('')}
      </select>
      <div style="font-size:11px;color:var(--text3);align-self:center">Qty:</div>
      <input type="number" id="fq-${rId}" min="0" value="${qty}" placeholder="0" style="background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px;width:100%"/>
      <button type="button" class="del-row-btn" onclick="removeFittingRow(${rId})">✕</button>
    </div>`;
  }).join('');
  // Non-standard fittings as extra rows
  const extraRows=existFittings.filter(f=>!STD_FITTINGS.includes(f.name)).map(f=>{
    fittingRowCounter++;
    const rId=fittingRowCounter;
    return`<div class="fitting-row" id="frow-${rId}">
      <select id="fn-${rId}" style="background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px">
        ${STD_FITTINGS.map(s=>`<option ${s===f.name?'selected':''}>${s}</option>`).join('')}
      </select>
      <div style="font-size:11px;color:var(--text3);align-self:center">Qty:</div>
      <input type="number" id="fq-${rId}" min="0" value="${f.qty}" placeholder="0" style="background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px;width:100%"/>
      <button type="button" class="del-row-btn" onclick="removeFittingRow(${rId})">✕</button>
    </div>`;
  }).join('');
  return`<div id="fittings-list">${stdRows}${extraRows}</div>
  <button type="button" class="btn btn-ghost btn-sm mt8" onclick="addFittingRow()">+ Add Fitting</button>`;
}

function addFittingRow(){
  fittingRowCounter++;
  const rId=fittingRowCounter;
  const html=`<div class="fitting-row" id="frow-${rId}">
    <select id="fn-${rId}" style="background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px">
      ${STD_FITTINGS.map(s=>`<option>${s}</option>`).join('')}
    </select>
    <div style="font-size:11px;color:var(--text3);align-self:center">Qty:</div>
    <input type="number" id="fq-${rId}" min="0" value="" placeholder="0" style="background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:var(--r10);padding:10px 13px;color:var(--text0);font-size:13.5px;width:100%"/>
    <button type="button" class="del-row-btn" onclick="removeFittingRow(${rId})">✕</button>
  </div>`;
  document.getElementById('fittings-list').insertAdjacentHTML('beforeend',html);
}

function removeFittingRow(rId){
  const el=document.getElementById(`frow-${rId}`);
  if(el) el.remove();
}

function collectFittings(){
  const fittings=[];
  const list=document.getElementById('fittings-list');
  if(!list) return fittings;
  list.querySelectorAll('[id^="fn-"]').forEach(sel=>{
    const rId=sel.id.slice(3);
    const name=sel.value;
    const qty=parseInt(document.getElementById(`fq-${rId}`)?.value||0)||0;
    if(qty>0) fittings.push({name,qty});
  });
  return fittings;
}

function buildAssignmentDropdown(engId, selectedAsnId='', returnHtml=false){
  const asns=engId?D.engActiveAssignments(engId):[];
  const html=`<div class="fg"><label>Assigned Pipe <span style="color:var(--rose);font-size:9px">*required</span></label>
    <select id="df-asn" onchange="onDprAsnChange(this.value)">
      <option value="">— Select Assigned Pipe —</option>
      ${asns.map(a=>`<option value="${a.id}" ${a.id===selectedAsnId?'selected':''}>${a.pipe.pipeType} ${a.pipe.diameter} (${a.pipe.material}) — ${a.remaining} remaining of ${a.quantity}</option>`).join('')}
    </select>
  </div>`;
  if(returnHtml) return html;
  const wrap=document.getElementById('df-asn-wrap');
  if(wrap) wrap.innerHTML=html;
  if(selectedAsnId) setTimeout(()=>onDprAsnChange(selectedAsnId),50);
}

function onDprEngChange(engId){
  buildAssignmentDropdown(engId,'');
  document.getElementById('df-pipe-info').style.display='none';
  const leftEl=document.getElementById('df-left');
  if(leftEl) leftEl.value='';
}

function onDprAsnChange(asnId){
  const infoBox=document.getElementById('df-pipe-info');
  const availInfo=document.getElementById('df-avail-info');
  const badge=document.getElementById('df-pipe-badge');
  if(!asnId){
    if(infoBox) infoBox.style.display='none';
    return;
  }
  const a=D.engActiveAssignments(null).find(x=>x.id===asnId)||
    D.assignments().map(a=>{
      const p=D.pipe(a.pipeId);const used=D.assignmentUsed(a.id);const remaining=Math.max(0,a.quantity-used);
      return{...a,pipe:p,used,remaining};
    }).find(x=>x.id===asnId);
  if(!a||!a.pipe){
    if(infoBox) infoBox.style.display='none';
    return;
  }
  if(infoBox) infoBox.style.display='block';
  if(badge) badge.textContent=`${a.pipe.pipeType} ${a.pipe.diameter}`;
  if(availInfo){
    const cls=a.remaining<20?'danger':a.remaining<50?'warn':'';
    availInfo.className=`avail-info${cls?' '+cls:''}`;
    availInfo.textContent=`📦 Assigned: ${a.quantity} | Used: ${a.used} | Remaining: ${a.remaining} pipes`;
  }
  updatePipesLeft();
}

function updatePipesLeft(){
  const asnId=document.getElementById('df-asn')?.value;
  const usedVal=parseInt(document.getElementById('df-used')?.value)||0;
  const leftEl=document.getElementById('df-left');
  if(!leftEl) return;
  if(!asnId){leftEl.value='';return}
  const a=D.assignments().find(x=>x.id===asnId);
  if(!a){leftEl.value='';return}
  const used=D.assignmentUsed(asnId);
  const remaining=Math.max(0,a.quantity-used);
  leftEl.value=Math.max(0,remaining-usedVal);
}

function collectDprData(engOverride=null){
  const engineerId=engOverride||document.getElementById('df-eng')?.value;
  const assignmentId=document.getElementById('df-asn')?.value||'';
  const date=document.getElementById('df-date')?.value||'';
  // Get pipe info from assignment
  let pipeType='',diameter='';
  if(assignmentId){
    const a=D.assignment(assignmentId);
    const p=a?D.pipe(a.pipeId):null;
    if(p){pipeType=p.pipeType;diameter=p.diameter}
  }
  const pipesUsed=parseInt(document.getElementById('df-used')?.value)||0;
  const pipesLeft=parseInt(document.getElementById('df-left')?.value)||0;
  const meterLaid=parseFloat(document.getElementById('df-meters')?.value)||0;
  const totalJoints=parseInt(document.getElementById('df-joints')?.value)||0;
  const startJunction=document.getElementById('df-sj')?.value.trim()||'';
  const endJunction=document.getElementById('df-ej')?.value.trim()||'';
  const notes=document.getElementById('df-notes')?.value.trim()||'';
  const fittings=collectFittings();
  const customFields=collectCustomFields();
  return{engineerId,assignmentId,date,pipeType,diameter,pipesUsed,pipesLeft,meterLaid,totalJoints,startJunction,endJunction,fittings,customFields,notes};
}

function saveDprCore(data,editId=null){
  if(!data.date) return toast('Select date','err');
  if(!data.assignmentId) return toast('Select an assigned pipe','err');
  if(!data.startJunction) return toast('Enter Start Junction','err');
  if(!data.endJunction) return toast('Enter End Junction','err');
  if(data.pipesUsed<0||data.meterLaid<0) return toast('No negative values allowed','err');
  if(data.pipesUsed===0) return toast('Pipes used cannot be 0','err');
  // Validate against assignment remaining
  const a=D.assignment(data.assignmentId);
  if(!a) return toast('Assignment not found','err');
  const prevUsedByThisDpr=editId?D.dprs().find(d=>d.id===editId)?.pipesUsed||0:0;
  const currentUsed=D.assignmentUsed(data.assignmentId)-prevUsedByThisDpr;
  const available=a.quantity-currentUsed;
  if(data.pipesUsed>available){
    toast(`Only ${available} pipes remaining in this assignment`,'err');
    return;
  }
  const dprs=D.dprs();
  if(editId){
    const idx=dprs.findIndex(d=>d.id===editId);
    if(idx!==-1) dprs[idx]={...dprs[idx],...data};
    toast('DPR updated ✔','ok');
  } else {
    dprs.push({id:uid(),...data});
    toast('DPR submitted successfully ✔','ok');
  }
  D.saveDprs(dprs);
  closeModal();
  // Real-time sync: refresh current page
  const ca=document.getElementById('content-area');
  if(currentPage==='pg-dprs') renderAllDprsPage(ca);
  else if(currentPage==='eng-dpr') renderEngDprForm(ca);
  else if(currentPage==='dash-eng') renderEngDash(ca);
  else if(currentPage==='dash-admin') renderAdminDash(ca);
  else if(currentPage==='eng-pipes') renderEngPipes(ca);
  else if(currentPage==='eng-reports') renderEngReportsPage(ca);
  else if(currentPage==='pg-assignments') renderAssignmentsPage(ca);
  checkLowStock();
}

function deleteDpr(id){

    checkLowStock();
  });
}

function saveTarget(){
  const engineerId=document.getElementById('tg-eng').value;

  const idx=targets.findIndex(t=>t.engineerId===engineerId&&t.month===month);

  if(infoBox) infoBox.style.display='block';
  if(badge) badge.textContent=`${a.pipe.pipeType} ${a.pipe.diameter} · ${a.pipe.material}`;
  const pct=a.quantity>0?Math.round(a.remaining/a.quantity*100):0;
  const st=stockStatus(a.remaining,a.quantity);
  if(availBar) availBar.innerHTML=`<div class="prog-wrap"><div class="prog-bar ${st.prog}" style="width:${pct}%"></div></div>`;
  if(availText){
    const cls=a.remaining<20?'danger':a.remaining<50?'warn':'';
    availText.className=`avail-info${cls?' '+cls:''}`;
    availText.innerHTML=`📦 <b>Assigned:</b> ${a.quantity} &nbsp;|&nbsp; <b>Used (DPR):</b> ${a.used} &nbsp;|&nbsp; <b>Available:</b> ${a.remaining} pipes`;
  }
  if(usedEl) usedEl.value='';
  if(leftEl) leftEl.value=a.remaining;
}

function onEngUsedInput(){
  const asnId=document.getElementById('df-asn')?.value;
  const usedEl=document.getElementById('df-used');
  const leftEl=document.getElementById('df-left');
  if(!asnId||!usedEl||!leftEl) return;
  const me=getMyEngineer();
  const a=me?D.engActiveAssignments(me.id).find(x=>x.id===asnId):null;
  if(!a) return;
  const used=parseInt(usedEl.value)||0;
  leftEl.value=Math.max(0,a.remaining-used);
  // Warn if exceeding
  if(used>a.remaining){
    usedEl.style.borderColor='var(--rose)';
    usedEl.style.boxShadow='0 0 0 2px rgba(255,79,123,.3)';
  } else {
    usedEl.style.borderColor='';usedEl.style.boxShadow='';
  }
}

function submitEngDpr(){
  const me=getMyEngineer();
  const assignmentId=document.getElementById('df-asn')?.value;
  const date=document.getElementById('df-date')?.value||'';
  const pipesUsed=parseInt(document.getElementById('df-used')?.value)||0;
  const pipesLeft=parseInt(document.getElementById('df-left')?.value)||0;
  const meterLaid=parseFloat(document.getElementById('df-meters')?.value)||0;
  const totalJoints=parseInt(document.getElementById('df-joints')?.value)||0;
  const startJunction=document.getElementById('df-sj')?.value.trim()||'';
  const endJunction=document.getElementById('df-ej')?.value.trim()||'';
  const notes=document.getElementById('df-notes')?.value.trim()||'';
  const fittings=collectFittings();
  const customFields=collectCustomFields();

  if(!assignmentId) return toast('Select an assigned pipe','err');
  if(!startJunction) return toast('Enter Start Junction','err');
  if(!endJunction) return toast('Enter End Junction','err');
  if(pipesUsed<=0) return toast('Pipes used must be > 0','err');
  if(meterLaid<=0) return toast('Meter laid must be > 0','err');

  const a=D.assignment(assignmentId);
  if(!a){toast('Assignment not found','err');return}
  const p=D.pipe(a.pipeId);
  if(!p){toast('Pipe not found','err');return}

  // Validate
  const currentUsed=D.assignmentUsed(assignmentId);
  const available=a.quantity-currentUsed;
  if(pipesUsed>available){
    toast(`Only ${available} pipes remaining in this assignment`,'err');
    return;
  }

  const data={
    engineerId:me.id,assignmentId,date,
    pipeType:p.pipeType,diameter:p.diameter,
    pipesUsed,pipesLeft,meterLaid,totalJoints,
    startJunction,endJunction,fittings,customFields,notes
  };
  saveDprCore(data);
}

function downloadCsv(rows,filename){
  const csv=rows.map(r=>r.map(cell=>`"${String(cell||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  toast(`Downloaded: ${filename}`,'ok');
}

// ── KEYBOARD SHORTCUTS ──────────────────────
document.getElementById('li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('li-id').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('li-pass').focus()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ── INIT ────────────────────────────────────
checkSession();
</script>
